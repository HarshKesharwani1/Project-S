<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who's Watching? - MeIsPyari: A Netflix Original</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/profile.css">
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div id="transition-overlay"></div>

    <div class="profile-container">
        <h1 class="profile-prompt">Who's watching?</h1>
        <div class="profile-list">
            <a href="dashboard.html" id="profile-sejal" class="profile-item">
                <div class="profile-avatar-wrapper">
                    <div class="profile-avatar">S</div>
                </div>
                <span class="profile-name">Sejal</span>
            </a>
        </div>
    </div>

    <!-- Intro Transition Overlay -->
    <div id="intro-overlay" class="intro-overlay">
        <div class="intro-logo-container">
            <svg class="intro-logo-n" viewBox="0 0 100 100">
                <!-- Left column -->
                <path d="M25 15 L40 15 L40 85 L25 85 Z" fill="#E50914" />
                <!-- Right column -->
                <path d="M60 15 L75 15 L75 85 L60 85 Z" fill="#E50914" />
                <!-- Diagonal overlap with darker shade for drop shadow effect -->
                <path d="M25 15 L75 85 L60 85 L25 15 Z" fill="#B80710" />
            </svg>
        </div>
    </div>

    <script src="js/state.js"></script>
    <script src="js/transition.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
